<!DOCTYPE html>
<html>
<head>
    <title>Migraine Classification</title>

    <style>

        body{
            font-family: Arial;
            background-image: url("https://cdn-icons-png.flaticon.com/512/2966/2966486.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 250px;
            background-color: #f2f2f2;
        }

        .main{
            width: 700px;
            margin: auto;
            margin-top: 40px;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 10px;
        }

        h1{
            text-align: center;
            font-style: italic;
            text-decoration: underline;
        }

        h2{
            text-align: center;
        }

        .age-box{
            text-align: center;
            margin-bottom: 30px;
        }

        .age-box input{
            width: 120px;
            height: 28px;
        }

        .form-container{
            display: flex;
            justify-content: space-between;
        }

        .column{
            width: 45%;
        }

        .field{
            margin-bottom: 10px;
        }

        .field label{
            display: inline-block;
            width: 120px;
        }

        .field input{
            width: 120px;
            height: 25px;
        }

        .btn{
            text-align: center;
            margin-top: 20px;
        }

        button{
            background-color: black;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<div class="main">

    <h1>"MIGRAINE CLASSIFICATION"</h1>

    <h2>[Personal Information]</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="age-box">
            <label>Age :</label>
            <input type="number" name="Age" required>
        </div>

        <h2>[Medical Information]</h2>

        <div class="form-container">

            <!-- LEFT COLUMN -->
            <div class="column">

                <div class="field">
                    <label>Duration</label>
                    <input type="number" name="Duration" required>
                </div>

                <div class="field">
                    <label>Location</label>
                    <input type="number" name="Location" required>
                </div>

                <div class="field">
                    <label>Intensity</label>
                    <input type="number" name="Intensity" required>
                </div>

                <div class="field">
                    <label>Vomit</label>
                    <input type="number" name="Vomit" required>
                </div>

                <div class="field">
                    <label>Photophobia</label>
                    <input type="number" name="Photophobia" required>
                </div>

                <div class="field">
                    <label>Sensory</label>
                    <input type="number" name="Sensory" required>
                </div>

                <div class="field">
                    <label>Dysarthria</label>
                    <input type="number" name="Dysarthria" required>
                </div>

                <div class="field">
                    <label>Tinnitus</label>
                    <input type="number" name="Tinnitus" required>
                </div>

                <div class="field">
                    <label>Diplopia</label>
                    <input type="number" name="Diplopia" required>
                </div>

                <div class="field">
                    <label>Ataxia</label>
                    <input type="number" name="Ataxia" required>
                </div>

                <div class="field">
                    <label>Paresthesia</label>
                    <input type="number" name="Paresthesia" required>
                </div>

            </div>

            <!-- RIGHT COLUMN -->
            <div class="column">

                <div class="field">
                    <label>Frequency</label>
                    <input type="number" name="Frequency" required>
                </div>

                <div class="field">
                    <label>Character</label>
                    <input type="number" name="Character" required>
                </div>

                <div class="field">
                    <label>Nausea</label>
                    <input type="number" name="Nausea" required>
                </div>

                <div class="field">
                    <label>Phonophobia</label>
                    <input type="number" name="Phonophobia" required>
                </div>

                <div class="field">
                    <label>Visual</label>
                    <input type="number" name="Visual" required>
                </div>

                <div class="field">
                    <label>Dysphasia</label>
                    <input type="number" name="Dysphasia" required>
                </div>

                <div class="field">
                    <label>Vertigo</label>
                    <input type="number" name="Vertigo" required>
                </div>

                <div class="field">
                    <label>Hypoacusis</label>
                    <input type="number" name="Hypoacusis" required>
                </div>

                <div class="field">
                    <label>Defect</label>
                    <input type="number" name="Defect" required>
                </div>

                <div class="field">
                    <label>Conscience</label>
                    <input type="number" name="Conscience" required>
                </div>

                <div class="field">
                    <label>DPF</label>
                    <input type="number" name="DPF" required>
                </div>

            </div>

        </div>

        <div class="btn">
            <button type="submit">Predict</button>
        </div>

    </form>

</div>

</body>
</html>
