<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: linear-gradient(to right, #d9a7c7, #fffcdc);
        }

        .container{
            width: 400px;
            margin: 100px auto;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px gray;
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        label{
            font-size: 18px;
            font-weight: bold;
        }

        input{
            width: 100%;
            height: 35px;
            margin-top: 8px;
            margin-bottom: 20px;
            padding-left: 10px;
            border-radius: 5px;
            border: 1px solid gray;
            font-size: 16px;
        }

        button{
            width: 100%;
            height: 40px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background-color: #45a049;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>User Registration</h1>

        <form method="POST">

            {% csrf_token %}

            <label>Username:</label>
            <input type="text" name="username" required>

            <label>Password:</label>
            <input type="password" name="password" required>

            <button type="submit">Register</button>

        </form>

    </div>

</body>
</html>
